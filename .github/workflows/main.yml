name: Pipeline CI-CD MLOps

on:
  push:
    branches: [ main, master ]  # Déclenche le pipeline à chaque push sur main ou master

jobs:
  # ----------------------------------------------------
  # ÉTAPE 1 : Exécution des tests unitaires et intégration
  # ----------------------------------------------------
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Accélère les futurs builds en mettant le cache pip en mémoire

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancement de la suite de tests (pytest)
         env:
          PYTHONPATH: .
          DATABASE_URL: "popo"
          CI: "true"
         run: |
          pytest -v

  # ----------------------------------------------------
  # ÉTAPES 2 & 3 : Build Docker automatique et Déploiement HF
  # ----------------------------------------------------
  deploy-to-huggingface:
    needs: run-tests  # Ne se lance QUE si les tests passent !
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Push vers Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configuration de l'identité Git pour le serveur GitHub
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # 2. Activation de LFS sur la machine GitHub
          git lfs install
          
          # 3. Push direct vers Hugging Face (le commit contient déjà le pointeur LFS)
          git push --force https://jackobess:$HF_TOKEN@huggingface.co/spaces/jackobess/OC_Projet8 HEAD:refs/heads/main